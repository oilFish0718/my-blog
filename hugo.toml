baseURL = 'https://my-blog-1eu.pages.dev/'
languageCode = 'zh-tw'
title = 'VA-11 Hall-A | Fish'
theme = 'hugo-theme-stack'

[permalinks]
    post = "/p/:slug/"

[params]
    mainSections = ["post"]

    [params.widgets]
    # 首頁右側要顯示什麼
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 15 } }
    ]
    # 文章內頁右側要顯示什麼
    page = [
        { type = "toc" },           # 文章目錄，長文章必備
        { type = "categories", params = { limit = 10 } }
    ]
    
    [params.sidebar]
        emoji = ""
        subtitle = "冷靜觀察，沈默紀錄。這裡是 Fish 的荒原。"
        # 💡 關鍵 1：加上領頭的斜線，確保從根目錄尋找
        avatar = "avatar.png" 

    [params.profile]
        enabled = true
        title = "Fish"
        description = "27 歲，酒吧觀察者。對人際關係保持冷淡。"
        # 💡 關鍵 2：確保 profile 區塊裡也要有這行
        avatar = "avatar.png" 
        avatarBorderRadius = "50%"

# 選單設定保持不變
[[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1

[[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 2

[[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3

[[menu.main]]
    identifier = "goals"
    name = "Goals"
    url = "/p/2026-goals/"
    weight = 4
