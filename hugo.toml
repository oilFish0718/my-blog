baseURL = 'https://my-blog-1eu.pages.dev/'
languageCode = 'zh-tw'
title = '箱箱油魚的小池塘🐟'
theme = 'hugo-theme-stack'

[permalinks]
    post = "/p/:slug/"

[params]
    mainSections = ["post"]

    [params.widgets]
    # 首頁右側要顯示什麼
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 15 } }
    ]
    # 文章內頁右側要顯示什麼
    page = [
        { type = "toc" },           # 文章目錄，長文章必備
        { type = "categories", params = { limit = 10 } }
    ]
    
    [params.sidebar]
        emoji = ""
        subtitle = "你不是在逃避,你只是需要點時間來修復自己。"
        # 💡 關鍵 1：加上領頭的斜線，確保從根目錄尋找
        avatar = "avatar.png" 

    [params.profile]
        enabled = true
        title = "Fish"
        description = "27 歲，酒吧觀察者。對人際關係保持冷淡。"
        # 💡 關鍵 2：確保 profile 區塊裡也要有這行
        avatar = "avatar.png" 
        avatarBorderRadius = "50%"

# 選單設定保持不變
[[menu.main]]
    identifier = "home"
    name = "主頁"
    url = "/"
    weight = 1
    [menu.main.params]
        icon = "home"      # 🏠 房子符號

[[menu.main]]
    identifier = "archives"
    name = "歸檔"
    url = "/archives/"
    weight = 2
    [menu.main.params]
        # 💡 把 "archive" 改成 "archives" 試試看，或者改用更穩的 "hash"
        icon = "archives"

[[menu.main]]
    identifier = "about"
    name = "關於我"
    url = "/about/"
    weight = 3
    [menu.main.params]
        icon = "user"      # 👤 人物符號

[[menu.main]]
    identifier = "search"
    name = "搜尋"
    url = "/search/"       # 💡 記得我們先前建立了 search.md 嗎？
    weight = 4
    [menu.main.params]
        icon = "search"    # 🔍 放大鏡符號

[[menu.main]]
    identifier = "goals"
    name = "目標"
    url = "/p/2026-goals/"
    weight = 5
    [menu.main.params]
        icon = "link"      # 🔗 連結符號（或是用 "target" 靶心符號）