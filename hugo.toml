baseURL = 'https://my-blog-1eu.pages.dev/'
languageCode = 'zh-tw'
title = 'VA-11 Hall-A | Fish'
theme = 'hugo-theme-stack'

[params]
    mainSections = ["post"]
    
    [params.sidebar]
        emoji = "🍸"
        subtitle = "冷靜觀察，沈默紀錄。這裡是 Fish 的荒原。"
        avatar = "avatar.png" # 確保 static 資料夾裡有這張圖

    [params.profile]
        enabled = true
        title = "Fish"
        description = "27 歲，酒吧觀察者。對人際關係保持冷淡。"
        avatarBorderRadius = "50%"

# 選單設定 (現在有 assets/icons 了，這裡就不會報錯)
[[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1
    params = { icon = "home" }

[[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 2
    params = { icon = "archive" }